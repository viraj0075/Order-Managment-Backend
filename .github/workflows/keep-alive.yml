name: Keep Render Backend Awake

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows you to trigger it manually from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -s https://order-backend-nssn.onrender.com/products/Burger > /dev/null
          echo "Render backend pinged successfully at $(date)"
